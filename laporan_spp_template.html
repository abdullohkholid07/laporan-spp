<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Dashboard Laporan SPP</title>
<style>
body{font-family:Arial,Helvetica,sans-serif;margin:0;background:#f3f4f6}
header{background:#16a34a;color:white;padding:16px}
.container{padding:20px;max-width:1000px;margin:auto}
.card{background:white;border-radius:10px;padding:16px;margin-bottom:16px;box-shadow:0 2px 6px rgba(0,0,0,.1)}
button{background:#16a34a;color:white;border:none;padding:10px 14px;border-radius:6px;cursor:pointer}
button:hover{opacity:.9}
table{width:100%;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid #ddd;text-align:left}
.status-lunas{color:green;font-weight:bold}
.status-belum{color:red;font-weight:bold}
</style>
</head>
<body>

<header>
<h2>Sistem Laporan Pembayaran SPP</h2>
</header>

<div class="container">

<div class="card">
<h3>Tambah Data Pembayaran</h3>
<input id="nama" placeholder="Nama Santri" />
<input id="bulan" placeholder="Bulan" />
<input id="jumlah" placeholder="Jumlah" type="number" />
<select id="status">
<option value="Lunas">Lunas</option>
<option value="Belum">Belum</option>
</select>
<button onclick="tambahData()">Simpan</button>
</div>

<div class="card">
<h3>Data Pembayaran</h3>
<table id="tabel">
<thead>
<tr>
<th>Nama</th>
<th>Bulan</th>
<th>Jumlah</th>
<th>Status</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

</div>

<script>
let data=[]

function render(){
const tbody=document.querySelector('#tabel tbody')
tbody.innerHTML=''

data.forEach(d=>{
const row=document.createElement('tr')

row.innerHTML=`
<td>${d.nama}</td>
<td>${d.bulan}</td>
<td>Rp ${Number(d.jumlah).toLocaleString()}</td>
<td class="${d.status==='Lunas'?'status-lunas':'status-belum'}">${d.status}</td>
`

tbody.appendChild(row)
})
}

function tambahData(){
const nama=document.getElementById('nama').value
const bulan=document.getElementById('bulan').value
const jumlah=document.getElementById('jumlah').value
const status=document.getElementById('status').value

if(!nama||!bulan||!jumlah){
alert('Lengkapi data')
return
}

data.push({nama,bulan,jumlah,status})
render()

}
</script>

</body>
</html>
